  <!-- Resume Section -->
  <section class="resume-section" style="padding: var(--space-3xl) 0 var(--space-xl) 0; margin-top: var(--header-height);">
    <div class="container">
      <div class="resume-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-md); margin-bottom: var(--space-xl); border-bottom: 1px solid var(--color-border); padding-bottom: var(--space-md);">

          <h1 style="font-weight: 700; margin-bottom: var(--space-xs);">Curriculum Vitae</h1>
          <p id="resume-last-updated" style="color: var(--color-text-muted); font-size: 0.9rem;">Last updated: Loading...</p>

        <a id="resume-download-btn" href="" download class="btn btn-primary"><i class="fas fa-download" style="margin-right: 8px;"></i> Download PDF</a>

      <!-- PDF Frame Container -->
      <div class="resume-viewer-container" style="background-color: var(--bg-surface); border: 1px solid var(--color-border); border-radius: var(--border-radius); overflow: hidden; box-shadow: var(--shadow-md); margin-bottom: var(--space-2xl);">
        <iframe id="resume-iframe" src="" style="width: 100%; height: 850px; border: none; display: block;">
